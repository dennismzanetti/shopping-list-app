<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    :root, [data-theme="light"] {
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
      --color-surface-offset:#f3f0ec;--color-surface-offset-2:#edeae5;
      --color-surface-dynamic:#e6e4df;--color-divider:#dcd9d5;--color-border:#d4d1ca;
      --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
      --color-text-inverse:#f9f8f4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-active:#0f3638;--color-primary-highlight:#cedcd8;
      --color-error:#a12c7b;--color-success:#437a22;--color-warning:#964219;
      --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);--shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
      --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
      --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
      --space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --font-body:'Inter',system-ui,sans-serif;--font-display:'Instrument Serif',Georgia,serif;
      --transition-interactive:180ms cubic-bezier(.16,1,.3,1);
      --nav-width:240px;--header-height:56px;--bottom-nav-height:64px;
    }
    [data-theme="dark"] {
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
      --color-surface-offset:#1d1c1a;--color-surface-offset-2:#22211f;
      --color-surface-dynamic:#2d2c2a;--color-divider:#262523;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-text-inverse:#2b2a28;--color-primary:#4f98a3;--color-primary-hover:#227f8b;
      --color-primary-active:#1a626b;--color-primary-highlight:#313b3b;
      --color-error:#d163a7;--color-success:#6daa45;--color-warning:#bb653b;
      --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);
      --shadow-lg:0 12px 32px oklch(0 0 0/.4);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition-interactive),color var(--transition-interactive)}
    img,svg{display:block;max-width:100%}
    button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
    input,textarea,select{font:inherit;color:inherit}
    ul{list-style:none}
    a{text-decoration:none;color:inherit}
    ::selection{background:oklch(from var(--color-primary) l c h/.2)}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

    /* Layout */
    .app-layout{display:grid;grid-template-columns:var(--nav-width) 1fr;grid-template-rows:var(--header-height) 1fr;grid-template-areas:"sidebar header" "sidebar main";min-height:100dvh}
    .sidebar{grid-area:sidebar;background:var(--color-surface);border-right:1px solid var(--color-border);display:flex;flex-direction:column;position:sticky;top:0;height:100dvh;overflow-y:auto;z-index:20;transition:background var(--transition-interactive),border-color var(--transition-interactive)}
    .sidebar-logo{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-5) var(--space-6);border-bottom:1px solid var(--color-divider);height:var(--header-height)}
    .logo-icon{width:32px;height:32px;background:var(--color-primary);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-inverse);flex-shrink:0}
    .logo-text{font-family:var(--font-display);font-size:var(--text-lg);color:var(--color-text);letter-spacing:-.01em}
    .sidebar-nav{flex:1;padding:var(--space-4) var(--space-3);display:flex;flex-direction:column;gap:var(--space-1)}
    .nav-section-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-faint);text-transform:uppercase;letter-spacing:.08em;padding:var(--space-3) var(--space-3) var(--space-1);margin-top:var(--space-2)}
    .nav-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3
